# log dir
log_dir: ./logs/gend_effort_simple

# model setting
model_name: gend_effort
backbone_name: vit

# Loss settings (Duy nhất Cross-Entropy)
weight_real: 1.0            # Trọng số cho class thật
weight_fake: 2.0            # Trọng số cho class giả (thường cao hơn để tăng AUC)
label_smoothing: 0.1        # Giúp model không bị overfitting

# backbone setting
backbone_config:
  mode: original
  num_classes: 2
  inc: 3
  dropout: false

# dataset
train_dataset: [FaceForensics++]
test_dataset: [Celeb-DF-v2]

compression: c23
train_batchSize: 4
test_batchSize: 4
workers: 2
frame_num:
  train: 8
  test: 32
resolution: 224

# CLIP mean/std chuẩn
mean: [0.48145466, 0.4578275, 0.40821073]
std:  [0.26862954, 0.26130258, 0.27577711]

# optimizer config
optimizer:
  type: adam
  adam:
    lr: 0.0003              # LR 3e-4 là mức chuẩn cho tuning Linear Head
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.0001

# training config
lr_scheduler: cosine
lr_T_max: 15
nEpochs: 15
start_epoch: 0
save_epoch: 1
manualSeed: 1024

# SWA giúp ổn định AUC khi dùng CE Loss
SWA: true
swa_start: 5

metric_scoring: auc